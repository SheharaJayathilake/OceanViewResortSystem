# File: src/main/resources/logging.properties

# Logging Configuration
handlers=java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# Console Handler
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# File Handler
java.util.logging.FileHandler.level=ALL
java.util.logging.FileHandler.pattern=logs/oceanview-%u-%g.log
java.util.logging.FileHandler.limit=5000000
java.util.logging.FileHandler.count=10
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter

# Root Logger Level
.level=INFO

# Package-specific Logging
com.oceanview.level=FINE
com.oceanview.dao.level=INFO
com.oceanview.service.level=INFO
com.oceanview.controller.level=INFO
